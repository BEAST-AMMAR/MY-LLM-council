version: '3.8'

services:
  ml_engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./ml_engine/models:/app/models
    environment:
      - PORT=8001
    restart: unless-stopped
    # If using GPU, uncomment below:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ML_ENGINE_URL=http://ml_engine:8001
    depends_on:
      - ml_engine
    restart: unless-stopped
